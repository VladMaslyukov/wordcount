name: CI/CD Pipeline for WordCount

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Добавляем возможность запускать пайплайн вручную
  workflow_dispatch:

jobs:
  # 1. СТАДИЯ СБОРКИ (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x cicd/build.sh

      - name: Run the build script
        run: ./cicd/build.sh

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/wordcount
          retention-days: 7

  # 2. СТАДИЯ ТЕСТИРОВАНИЯ (Test)
  test:
    runs-on: ubuntu-latest
    needs: build        # Ждёт успешного завершения задачи 'build'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/

      - name: Make test script executable
        run: chmod +x cicd/test.sh

      - name: Run the test script
        run: ./cicd/test.sh

  # 3. СТАДИЯ УПАКОВКИ (Package)
  package:
    runs-on: ubuntu-latest
    needs: test        # Ждёт успешного завершения задачи 'test'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/

      - name: Make package script executable
        run: chmod +x cicd/package.sh

      - name: Run the package script
        run: ./cicd/package.sh

      - name: Upload .deb package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-package
          path: wordcount-1.0.deb
          retention-days: 7
