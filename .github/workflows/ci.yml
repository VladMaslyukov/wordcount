name: CI/CD PipSeline for WordCount

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Добавляем возможность запускать пайплайн вручную
  workflow_dispatch:

jobs:
  # 1. СТАДИЯ СБОРКИ (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x cicd/build.sh

      - name: Run the build script
        run: ./cicd/build.sh

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/wordcount
          retention-days: 7

  # 2. СТАДИЯ ТЕСТИРОВАНИЯ (Test)
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/

      - name: Make test script executable
        run: chmod +x cicd/test.sh

      - name: Run the test script
        run: ./cicd/test.sh

  # 3. СТАДИЯ УПАКОВКИ (Package)
  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/

      - name: Make package script executable
        run: chmod +x cicd/package.sh

      - name: Run the package script
        run: ./cicd/package.sh

      - name: Upload .deb package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Swordcount-package
          path: wordcount-1.0.deb
          retention-days: 7
 # СТАДИЯ 4: DEPLOY (Docker)
  deploy:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .deb package artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-package
          path: ./

      - name: List downloaded files (for debugging)
        run: ls -la

      - name: Build Docker image
        run: docker build -t wordcount:latest .

      - name: Run Docker container and check output
        run: |
          OUTPUT=$(docker run --rm wordcount:latest)
          echo "Container output: $OUTPUT"
          if echo "$OUTPUT" | grep -q "Количество слов: 3"; then
            echo "Docker container test passed!"
          else
            echo "Docker container test failed!"
            exit 1
          fi

# РЕЛИЗ
  release:
    runs-on: ubuntu-latest
    needs: package          # Запускается после успешной упаковки
    permissions:
      contents: write
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-package

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          name: "WordCount ${{ github.ref_name }}"
          body: |
            Автоматический релиз программы для подсчёта слов.
            Пакет wordcount-1.0.deb прикреплён к релизу.
          files: wordcount-1.0.deb
