name: CI/CD Pipeline for WordCount

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Добавляем возможность запускать пайплайн вручную
  workflow_dispatch:

jobs:
  # 1. СТАДИЯ СБОРКИ (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x cicd/build.sh

      - name: Run the build script
        run: ./cicd/build.sh

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/wordcount
          retention-days: 7

  # 2. СТАДИЯ ТЕСТИРОВАНИЯ (Test)
  test:
    runs-on: ubuntu-latest
    needs: build        # Ждёт успешного завершения задачи 'build'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/

      - name: Make test script executable
        run: chmod +x cicd/test.sh

      - name: Run the test script
        run: ./cicd/test.sh

  # 3. СТАДИЯ УПАКОВКИ (Package)
  package:
    runs-on: ubuntu-latest
    needs: test        # Ждёт успешного завершения задачи 'test'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-binary
          path: usr/bin/

      - name: Make package script executable
        run: chmod +x cicd/package.sh

      - name: Run the package script
        run: ./cicd/package.sh

      - name: Upload .deb package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-package
          path: wordcount-1.0.deb
          retention-days: 7
 # СТАДИЯ 4: DEPLOY (Docker)
  deploy:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .deb package artifact
        uses: actions/download-artifact@v4
        with:
          name: wordcount-package
          path: ./

      - name: List downloaded files (for debugging)
        run: ls -la

      - name: Build Docker image
        run: docker build -t wordcount:latest .

      - name: Run Docker container and check output
        run: |
          OUTPUT=$(docker run --rm wordcount:latest)
          echo "Container output: $OUTPUT"
          if echo "$OUTPUT" | grep -q "Количество слов: 3"; then
            echo "Docker container test passed!"
          else
            echo "Docker container test failed!"
            exit 1
          fi

# --- НОВЫЙ ШАГ 1: Вход в Docker Hub ---
      - name: Log in to Docker Hub
        uses: docker/login-action@v3  # Используем официальный action от Docker [citation:1]
        with:
          username: ${{ vars.DOCKER_USERNAME }}   # Используем переменную
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Используем секрет

      # --- НОВЫЙ ШАГ 2: Подготовка метаданных (тегов) ---
      # Этот action автоматически генерирует "умные" теги на основе ветки или тега Git [citation:3]
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # images: имя_пользователя/имя_репозитория
          images: ${{ vars.DOCKER_USERNAME }}/wordcount
          tags: |
            type=raw,value=latest
            type=sha,prefix={{date 'YYYYMMDD'}}-

      # --- НОВЫЙ ШАГ 3: Сборка и публикация образа ---
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .             # Где искать Dockerfile
          push: true             # Отправляем образ в реестр
          tags: ${{ steps.meta.outputs.tags }}  # Используем теги из предыдущего шага
          labels: ${{ steps.meta.outputs.labels }}

      # --- (Опционально) Запуск контейнера для проверки ---
      - name: Run Docker container and check output
        run: |
          # Проверяем, что образ был собран и опубликован, запустив его
          OUTPUT=$(docker run --rm wordcount:latest)
          echo "Container output: $OUTPUT"
          if echo "$OUTPUT" | grep -q "Количество слов: 3"; then
            echo "Docker container test passed!"
          else
            echo "Docker container test failed!"
            exit 1
          fi

      # ОПЦИОНАЛЬНО: Пуш в Docker Hub
      # Для этого нужно добавить секреты в настройках GitHub:
      # Settings → Secrets and variables → Actions → New repository secret
      # DOCKER_USERNAME и DOCKER_PASSWORD или DOCKER_TOKEN
      #
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_TOKEN }}
      #
      # - name: Push Docker image to Docker Hub
      #   run: |
      #     docker tag wordcount:latest ${{ secrets.DOCKER_USERNAME }}/wordcount:latest
      #     docker push ${{ secrets.DOCKER_USERNAME }}/wordcount:latest
